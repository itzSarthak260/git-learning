<!--in this we learned about caption,col span also-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLE</title>
</head>
<body>
    <table border="9">
        <caption>college</caption>
        <tr>
            <th>language</th>
            <th>year</th>
        </tr>
        <tr>
            <td>c</td>
            <td>2nd year</td>
        </tr>
        <tr>
            <td>c++</td>
            <td>3rd year</td>
        </tr>
    </table>
</body>
</html>
