<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADIO</title>
</head>
<body>
    <form>
        <label for="male">male: </label>
        <input type="radio" name="gender" id="male"><br>
        <label for="female">female: </label>
        <input type="radio" name="gender" id="female"><br>
        <label for="other">others: </label>
        <input type="radio" name="gender" id="other"><br> 
    </form>
    <form>
        <label for="veg">veg : </label>
        <input type="checkbox" name="meal" id="veg"><br>
        <label for="nonveg">nonveg : </label>
        <input type="checkbox" name="meal" id="nonveg"><br>
        <label for="both">both : </label>
        <input type="checkbox" name="meal" id="both"><br>
    </form>
    <form>
        <label for="country">select your country: </label>
        <select name="x" id="country">
            <option value="austalia">AUSTRALIA</option>
            <option value="india">INDIA</option>
            <option value="china">CHINA</option>
        </select>
    </form>
    <textarea rows="4" cols="40">
        default text
    </textarea>
</body>
</html>
